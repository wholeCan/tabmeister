<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Music to Tabs - Tabmeister</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="email"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }
        input[type="email"]:focus,
        input[type="file"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .file-info {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
        .beer-fund {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #ddd;
            text-align: center;
        }
        .beer-fund-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .beer-fund button {
            width: auto;
            display: inline-block;
            padding: 10px 24px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            font-size: 14px;
        }
        .beer-fund button:hover {
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Tabmeister</h1>
        <p class="subtitle">Convert sheet music PDFs to MusicXML format</p>

        <form id="uploadForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="you@example.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="file">PDF File (Max 300KB)</label>
                <input
                    type="file"
                    id="file"
                    name="file"
                    accept=".pdf"
                    required
                >
                <div class="file-info">
                    Supported: PDF files up to 300KB
                </div>
            </div>

            <button type="submit" id="submitBtn">Convert Sheet Music</button>
        </form>

        <div id="message" class="message"></div>

        <div class="beer-fund">
            <p class="beer-fund-text">This service is free, but if you want to contribute to my beer fund:</p>
            <button type="button" onclick="window.location.href='{{ venmo_link }}'">Buy Me a Beer 🍺</button>
        </div>
    </div>

    <script>
        document.getElementById("uploadForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const messageEl = document.getElementById("message");
            const submitBtn = document.getElementById("submitBtn");
            messageEl.style.display = "none";

            const formData = new FormData();
            formData.append("email", document.getElementById("email").value);
            formData.append("file", document.getElementById("file").files[0]);

            submitBtn.disabled = true;
            submitBtn.textContent = "Processing...";

            try {
                const response = await fetch("/upload", {
                    method: "POST",
                    body: formData,
                });

                const data = await response.json();

                messageEl.textContent = data.success
                    ? data.message
                    : data.error;
                messageEl.className = `message ${data.success ? "success" : "error"}`;
                messageEl.style.display = "block";

                if (data.success) {
                    document.getElementById("uploadForm").reset();
                }
            } catch (error) {
                messageEl.textContent = "Network error. Please try again.";
                messageEl.className = "message error";
                messageEl.style.display = "block";
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Convert Sheet Music";
            }
        });

        // Client-side file size validation
        document.getElementById("file").addEventListener("change", (e) => {
            const file = e.target.files[0];
            const maxSize = 300 * 1024; // 300KB
            if (file && file.size > maxSize) {
                alert(`File is too large. Maximum size is 300KB. Your file is ${(file.size / 1024).toFixed(1)}KB.`);
                e.target.value = "";
            }
        });
    </script>
</body>
</html>
